<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>Digital Art by Sanjay Shukla</title>
    <link rel="stylesheet" href="/styles.css?v=1">
</head>
<body oncontextmenu="return false">
    <header class="site-header">
        <h1>Digital Art by Sanjay Shukla</h1>
    </header>

    <main class="gallery" data-gallery>
        <button class="tile" type="button" aria-label="Open painting: Radha Krishna">
            <picture>
                <source type="image/avif" srcset="/images/radha-krishna.avif">
                <img src="/images/radha-krishna.jpg" alt="Radha Krishna" draggable="false" loading="lazy">
            </picture>
        </button>
        <button class="tile" type="button" aria-label="Open painting: Lord Shiva">
            <picture>
                <source type="image/avif" srcset="/images/lordshiva.avif">
                <img src="/images/lordshiva.jpg" alt="Lord Shiva" draggable="false" loading="lazy">
            </picture>
        </button>
        <button class="tile" type="button" aria-label="Open painting: Lord Shiva — stained glass">
            <picture>
                <source type="image/avif" srcset="/images/lord-shiva-2.avif">
                <img src="/images/lord-shiva-2.jpg" alt="Lord Shiva — stained glass" draggable="false" loading="lazy">
            </picture>
        </button>
        <button class="tile" type="button" aria-label="Open painting: Siya Ram">
            <picture>
                <source type="image/avif" srcset="/images/siya-ram.avif">
                <img src="/images/siya-ram.jpg" alt="Siya Ram" draggable="false" loading="lazy">
            </picture>
        </button>
    </main>

    <div class="lightbox" id="lightbox" hidden role="dialog" aria-modal="true" aria-label="Painting viewer">
        <button class="lightbox-close" type="button" aria-label="Close (Esc)">×</button>
        <button class="lightbox-prev" type="button" aria-label="Previous (←)">‹</button>
        <button class="lightbox-next" type="button" aria-label="Next (→)">›</button>
        <figure class="lightbox-figure">
            <img class="lightbox-img" alt="" draggable="false">
            <figcaption class="lightbox-caption"></figcaption>
        </figure>
    </div>

    <script>
        (() => {
            const lightbox = document.getElementById('lightbox');
            const lbImg = lightbox.querySelector('.lightbox-img');
            const lbCaption = lightbox.querySelector('.lightbox-caption');
            const lbClose = lightbox.querySelector('.lightbox-close');
            const lbPrev = lightbox.querySelector('.lightbox-prev');
            const lbNext = lightbox.querySelector('.lightbox-next');

            const tiles = [...document.querySelectorAll('[data-gallery] .tile')];
            const images = tiles.map(b => {
                const img = b.querySelector('img');
                return { src: img.getAttribute('src'), alt: img.getAttribute('alt') };
            });

            let activeIdx = 0;
            let lastTrigger = null;

            function show() {
                const item = images[activeIdx];
                lbImg.src = item.src;
                lbImg.alt = item.alt;
                lbCaption.textContent = item.alt;
                lbPrev.hidden = lbNext.hidden = images.length < 2;
            }

            function open(i, trigger) {
                activeIdx = i;
                lastTrigger = trigger || null;
                show();
                lightbox.hidden = false;
                document.body.style.overflow = 'hidden';
                lbClose.focus();
            }

            function close() {
                lightbox.hidden = true;
                document.body.style.overflow = '';
                lbImg.src = '';
                if (lastTrigger) lastTrigger.focus();
            }

            function nav(delta) {
                activeIdx = (activeIdx + delta + images.length) % images.length;
                show();
            }

            tiles.forEach((b, i) => b.addEventListener('click', () => open(i, b)));
            lbClose.addEventListener('click', close);
            lbPrev.addEventListener('click', () => nav(-1));
            lbNext.addEventListener('click', () => nav(1));
            lightbox.addEventListener('click', e => { if (e.target === lightbox) close(); });
            document.addEventListener('keydown', e => {
                if (lightbox.hidden) return;
                if (e.key === 'Escape') close();
                else if (e.key === 'ArrowLeft') nav(-1);
                else if (e.key === 'ArrowRight') nav(1);
            });
        })();
    </script>
</body>
</html>
